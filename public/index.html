<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スクリーンショット取得ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 28px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .badge {
      font-size: 0.72rem;
      font-weight: 600;
      background: #e8f0fe;
      color: #4f8ef7;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .card-desc {
      font-size: 0.84rem;
      color: #888;
      margin-bottom: 16px;
    }

    /* ---- サイトマップセクション ---- */

    .sitemap-input-row {
      display: flex;
      gap: 8px;
    }

    .sitemap-input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .sitemap-input-row input:focus { border-color: #4f8ef7; }

    .btn-fetch {
      background: #4f8ef7;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .btn-fetch:hover:not(:disabled) { background: #3a7de0; }
    .btn-fetch:disabled { background: #a0b4d8; cursor: not-allowed; }

    .sitemap-loading {
      display: none;
      margin-top: 16px;
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      padding: 12px;
    }

    .sitemap-loading .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #e0e0e0;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    .sitemap-results { display: none; margin-top: 16px; }

    .sitemap-results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .sitemap-count {
      font-size: 0.85rem;
      color: #666;
    }

    .btn-add-all {
      background: #fff;
      color: #4f8ef7;
      border: 1.5px solid #4f8ef7;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-add-all:hover { background: #f0f5ff; }

    .sitemap-list {
      max-height: 360px;
      overflow-y: auto;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
    }

    .sitemap-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    .sitemap-item:last-child { border-bottom: none; }
    .sitemap-item:hover { background: #f9fafb; }
    .sitemap-item.added { background: #f0fff4; }

    .sitemap-item-info {
      flex: 1;
      min-width: 0;
    }

    .sitemap-item-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sitemap-item-url {
      font-size: 0.76rem;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .btn-add-url {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1.2rem;
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-add-url:hover { background: #3a7de0; }
    .btn-add-url.done { background: #27ae60; cursor: default; }

    .sitemap-error {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: #fff5f5;
      border: 1px solid #fcc;
      border-radius: 8px;
      color: #e74c3c;
      font-size: 0.85rem;
    }

    /* ---- スクリーンショットセクション ---- */

    .url-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .url-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .url-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    .url-row input:focus { border-color: #4f8ef7; }

    .btn-remove {
      background: none;
      border: 1.5px solid #e0e0e0;
      color: #999;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-remove:hover {
      border-color: #e74c3c;
      color: #e74c3c;
      background: #fff5f5;
    }

    .btn-add {
      background: none;
      border: 1.5px dashed #4f8ef7;
      color: #4f8ef7;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      width: 100%;
    }

    .btn-add:hover { background: #f0f5ff; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .btn-primary {
      flex: 1;
      background: #4f8ef7;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover:not(:disabled) { background: #3a7de0; }
    .btn-primary:disabled { background: #a0b4d8; cursor: not-allowed; }

    .btn-zip {
      background: #fff;
      color: #4f8ef7;
      border: 1.5px solid #4f8ef7;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-zip:hover:not(:disabled) { background: #f0f5ff; }
    .btn-zip:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 進捗 */
    .progress-area { display: none; margin-top: 16px; }

    .progress-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.88rem;
    }

    .progress-item:last-child { border-bottom: none; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #e0e0e0;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .icon-ok  { color: #27ae60; font-size: 1rem; }
    .icon-err { color: #e74c3c; font-size: 1rem; }

    /* 結果 */
    .results-area { display: none; }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .result-card {
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .result-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .result-card.error { border-color: #fcc; background: #fff8f8; }

    .thumbnail {
      width: 100%;
      height: 160px;
      object-fit: cover;
      object-position: top;
      display: block;
      border-bottom: 1px solid #e8e8e8;
      background: #f5f5f5;
    }

    .result-info { padding: 10px 12px; }

    .result-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #222;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-url {
      font-size: 0.75rem;
      color: #999;
      word-break: break-all;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .btn-download {
      display: block;
      width: 100%;
      background: #4f8ef7;
      color: #fff;
      border: none;
      padding: 7px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s;
    }

    .btn-download:hover { background: #3a7de0; }

    .error-msg {
      font-size: 0.8rem;
      color: #e74c3c;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>スクリーンショット取得ツール</h1>
    <p class="subtitle">URLを入力してフルページスクリーンショットを一括取得できます。</p>

    <!-- ① サイトマップから追加 -->
    <div class="card">
      <div class="card-title">
        サイトマップから追加
        <span class="badge">STEP 1（任意）</span>
      </div>
      <p class="card-desc">サイトのURLを入力するとページ一覧（URL＋タイトル）を自動取得します。</p>

      <div class="sitemap-input-row">
        <input type="text" id="sitemapUrl" placeholder="https://example.com" />
        <button class="btn-fetch" id="btnFetch" onclick="fetchSitemap()">取得</button>
      </div>

      <div class="sitemap-loading" id="sitemapLoading">
        <span class="spinner"></span>ページ一覧とタイトルを取得中…
      </div>

      <div class="sitemap-error" id="sitemapError"></div>

      <div class="sitemap-results" id="sitemapResults">
        <div class="sitemap-results-header">
          <span class="sitemap-count" id="sitemapCount"></span>
          <button class="btn-add-all" onclick="addAllToList()">全部追加</button>
        </div>
        <div class="sitemap-list" id="sitemapList"></div>
      </div>
    </div>

    <!-- ② スクリーンショット -->
    <div class="card">
      <div class="card-title">
        スクリーンショット取得
        <span class="badge">STEP 2</span>
      </div>
      <p class="card-desc">URLを入力して「取得」を押すと、フルページスクリーンショットを撮影します。</p>

      <div class="url-list" id="urlList">
        <div class="url-row">
          <input type="text" placeholder="https://example.com" />
          <button class="btn-remove" onclick="removeRow(this)" title="削除">×</button>
        </div>
      </div>

      <button class="btn-add" onclick="addRow()">＋ URLを追加</button>

      <div class="actions">
        <button class="btn-primary" id="btnCapture" onclick="capture()">スクリーンショット取得</button>
        <button class="btn-zip" id="btnZip" onclick="downloadZip()" disabled>ZIP一括DL</button>
      </div>

      <div class="progress-area" id="progressArea">
        <div id="progressList"></div>
      </div>
    </div>

    <!-- ③ 結果 -->
    <div class="results-area card" id="resultsArea">
      <div class="result-grid" id="resultGrid"></div>
    </div>
  </div>

  <script>
    let capturedIds = [];

    // ---- サイトマップ ----

    async function fetchSitemap() {
      const url = document.getElementById('sitemapUrl').value.trim();
      if (!url) { alert('URLを入力してください'); return; }

      document.getElementById('btnFetch').disabled = true;
      document.getElementById('sitemapLoading').style.display = 'block';
      document.getElementById('sitemapResults').style.display = 'none';
      document.getElementById('sitemapError').style.display = 'none';

      try {
        const res = await fetch('/sitemap', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });

        const data = await res.json();

        if (!res.ok) {
          showSitemapError(data.error || 'エラーが発生しました');
          return;
        }

        renderSitemapResults(data.pages);

      } catch (err) {
        showSitemapError('通信エラー: ' + err.message);
      } finally {
        document.getElementById('btnFetch').disabled = false;
        document.getElementById('sitemapLoading').style.display = 'none';
      }
    }

    function showSitemapError(msg) {
      const el = document.getElementById('sitemapError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function renderSitemapResults(pages) {
      document.getElementById('sitemapCount').textContent = `${pages.length} ページ見つかりました`;

      const list = document.getElementById('sitemapList');
      list.innerHTML = pages.map((p, i) => `
        <div class="sitemap-item" id="si-${i}">
          <div class="sitemap-item-info">
            <div class="sitemap-item-title">${escHtml(p.title)}</div>
            <div class="sitemap-item-url">${escHtml(p.url)}</div>
          </div>
          <button class="btn-add-url" onclick="addUrlToList('${escAttr(p.url)}', this)" title="スクリーンショットリストに追加">＋</button>
        </div>
      `).join('');

      document.getElementById('sitemapResults').style.display = 'block';
    }

    function addUrlToList(url, btn) {
      addRow(url);
      if (btn) {
        btn.textContent = '✔';
        btn.classList.add('done');
        btn.onclick = null;
        btn.closest('.sitemap-item').classList.add('added');
      }
    }

    function addAllToList() {
      const items = document.querySelectorAll('.sitemap-item');
      items.forEach(item => {
        const url = item.querySelector('.sitemap-item-url').textContent;
        const btn = item.querySelector('.btn-add-url');
        if (!btn.classList.contains('done')) {
          addUrlToList(url, btn);
        }
      });
    }

    // ---- スクリーンショット ----

    function addRow(value = '') {
      const list = document.getElementById('urlList');
      const row = document.createElement('div');
      row.className = 'url-row';
      row.innerHTML = `
        <input type="text" placeholder="https://example.com" value="${escAttr(value)}" />
        <button class="btn-remove" onclick="removeRow(this)" title="削除">×</button>
      `;
      list.appendChild(row);
      if (!value) row.querySelector('input').focus();
    }

    function removeRow(btn) {
      const rows = document.querySelectorAll('.url-row');
      if (rows.length <= 1) {
        btn.closest('.url-row').querySelector('input').value = '';
        return;
      }
      btn.closest('.url-row').remove();
    }

    async function capture() {
      const inputs = document.querySelectorAll('.url-row input');
      const urls = [...inputs].map(i => i.value.trim()).filter(Boolean);

      if (urls.length === 0) {
        alert('URLを1つ以上入力してください。');
        return;
      }

      capturedIds = [];
      document.getElementById('btnCapture').disabled = true;
      document.getElementById('btnZip').disabled = true;
      document.getElementById('resultGrid').innerHTML = '';
      document.getElementById('resultsArea').style.display = 'none';

      const progressArea = document.getElementById('progressArea');
      const progressList = document.getElementById('progressList');
      progressArea.style.display = 'block';
      progressList.innerHTML = urls.map((u, i) => `
        <div class="progress-item" id="prog-${i}">
          <div class="spinner"></div>
          <span>${escHtml(u)}</span>
        </div>
      `).join('');

      try {
        const res = await fetch('/screenshot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ urls }),
        });

        const data = await res.json();

        data.results.forEach((r, i) => {
          const item = document.getElementById(`prog-${i}`);
          if (r.status === 'ok') {
            item.querySelector('.spinner').outerHTML = '<span class="icon-ok">✔</span>';
            capturedIds.push(r.id);
          } else {
            item.querySelector('.spinner').outerHTML = '<span class="icon-err">✖</span>';
          }
        });

        renderResults(data.results);

      } catch (err) {
        alert('エラーが発生しました: ' + err.message);
      } finally {
        document.getElementById('btnCapture').disabled = false;
        document.getElementById('btnZip').disabled = capturedIds.length === 0;
      }
    }

    function renderResults(results) {
      const grid = document.getElementById('resultGrid');
      const area = document.getElementById('resultsArea');

      grid.innerHTML = results.map(r => {
        if (r.status === 'ok') {
          return `
            <div class="result-card">
              <img class="thumbnail" src="/download/${r.id}" alt="${escAttr(r.url)}" loading="lazy" />
              <div class="result-info">
                <div class="result-title">${escHtml(r.title || r.url)}</div>
                <div class="result-url">${escHtml(r.url)}</div>
                <a class="btn-download" href="/download/${r.id}" download="${escAttr(r.download_name || 'screenshot.png')}">ダウンロード</a>
              </div>
            </div>`;
        } else {
          return `
            <div class="result-card error">
              <div class="result-info">
                <div class="result-url">${escHtml(r.url)}</div>
                <div class="error-msg">エラー: ${escHtml(r.error || '不明なエラー')}</div>
              </div>
            </div>`;
        }
      }).join('');

      area.style.display = 'block';
    }

    async function downloadZip() {
      if (capturedIds.length === 0) return;
      const res = await fetch('/download-zip', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids: capturedIds }),
      });
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'screenshots.zip';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Enter キーでサイトマップ取得
    document.getElementById('sitemapUrl').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchSitemap();
    });

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escAttr(str) {
      return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
